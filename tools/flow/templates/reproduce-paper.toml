[flow]
id = "reproduce"

[[gates]]
id = "source"
strict = true
attempts = ["run"]
checks = ["source"]

[[gates]]
id = "protocol"
requires = ["source"]
strict = true
attempts = ["run", "audit"]
checks = ["protocol"]

[[gates]]
id = "plan"
requires = ["protocol"]
strict = true
attempts = ["run"]
checks = ["plan"]

[[gates]]
id = "script"
requires = ["plan"]
strict = true
attempts = ["run", "audit"]
checks = ["script"]

[[gates]]
id = "trust"
requires = ["script"]
strict = true
attempts = ["trial"]
checks = ["trust"]

[[gates]]
id = "run"
requires = ["trust"]
strict = true
attempts = ["run"]
checks = ["cover", "exists", "agree", "fresh", "producer"]

[[gates]]
id = "assemble"
requires = ["run"]
strict = true
attempts = ["run"]
checks = ["assemble"]

[[gates]]
id = "close"
requires = ["assemble"]
strict = true
attempts = ["report", "audit"]
checks = ["close"]

[[gates]]
id = "report"
requires = ["close"]
strict = true
attempts = ["report", "audit"]
checks = ["report"]
